name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CAMP_CODE: test-camp-2026
  NEXT_PUBLIC_FIREBASE_API_KEY: fake-api-key
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-test-project

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npx vitest run tests/unit/ --reporter=verbose

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci --legacy-peer-deps

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase Emulator
        run: |
          firebase emulators:start --only firestore,auth --project demo-test-project &
          # Wait for emulators to be ready
          echo "Waiting for Firestore emulator..."
          until curl -s http://127.0.0.1:8080/ > /dev/null 2>&1; do sleep 1; done
          echo "Waiting for Auth emulator..."
          until curl -s http://127.0.0.1:9099/ > /dev/null 2>&1; do sleep 1; done
          echo "Emulators ready!"

      - name: Seed test data & get admin token
        run: npx tsx tests/setup/seed-and-start.ts
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099

      - name: Start dev server
        run: |
          npm run dev &
          echo "Waiting for dev server..."
          until curl -s http://localhost:3000/ > /dev/null 2>&1; do sleep 2; done
          echo "Dev server ready!"
        env:
          FB_PROJECT_ID: demo-test-project
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099

      - name: Run integration & security tests
        run: npx vitest run tests/integration/ tests/security/ --reporter=verbose
        env:
          TEST_BASE_URL: http://localhost:3000
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099

  e2e-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase Emulator
        run: |
          firebase emulators:start --only firestore,auth --project demo-test-project &
          until curl -s http://127.0.0.1:8080/ > /dev/null 2>&1; do sleep 1; done
          until curl -s http://127.0.0.1:9099/ > /dev/null 2>&1; do sleep 1; done
          echo "Emulators ready!"

      - name: Seed test data
        run: npx tsx tests/setup/seed-and-start.ts
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099

      - name: Start dev server
        run: |
          npm run dev &
          until curl -s http://localhost:3000/ > /dev/null 2>&1; do sleep 2; done
          echo "Dev server ready!"
        env:
          FB_PROJECT_ID: demo-test-project
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099

      - name: Run E2E tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000
          CI: true
          FB_PROJECT_ID: demo-test-project
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
