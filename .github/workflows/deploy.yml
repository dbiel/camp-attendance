name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Node 24 is mandatory — Node 20 breaks the Next 14 frameworks build/deploy.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --legacy-peer-deps

      # Reconstruct .env.local from secrets. This mirrors the local-deploy
      # mechanism exactly: Next inlines NEXT_PUBLIC_* at build time, and the
      # firebase web-frameworks integration bundles .env.local into the SSR
      # function so ANTHROPIC_API_KEY / CASE_PARSE_MODEL are present at runtime.
      # Firebase admin uses Application Default Credentials in prod, so no
      # service-account secrets go in this file.
      - name: Write runtime env
        run: |
          cat > .env.local <<EOF
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          CASE_PARSE_MODEL=${{ secrets.CASE_PARSE_MODEL }}
          EOF

      # Green gate: prove the production build compiles with prod env.
      - name: Build
        run: npm run build

      # Auto-deploy via firebase-tools + service account (mirrors the working
      # local deploy: webframeworks builds and pushes the SSR function, reading
      # .env.local written above). The action-hosting-deploy action can't deploy
      # a Next SSR frameworks function, so we deploy directly. The CI service
      # account (firebase-adminsdk-fbsvc) has been granted deploy IAM, so this
      # is a real gate — a failed deploy fails the workflow.
      - name: Deploy (hosting + rules + indexes)
        id: deploy
        run: |
          # pipefail is ESSENTIAL: without it, `firebase ... | tee` would report
          # tee's exit code (always 0) and a failed deploy would pass silently.
          set -o pipefail
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          # Validate the SA key file without leaking it: confirm valid JSON,
          # right client_email, and a PEM private key with real newlines.
          node -e '
            const fs=require("fs");
            const p=process.env.GOOGLE_APPLICATION_CREDENTIALS;
            const raw=fs.readFileSync(p,"utf8");
            console.log("sa.json bytes:", raw.length);
            let j; try { j=JSON.parse(raw); } catch(e){ console.error("INVALID JSON:", e.message); process.exit(1);}
            console.log("type:", j.type, "| client_email:", j.client_email);
            console.log("private_key present:", !!j.private_key,
                        "| has BEGIN:", (j.private_key||"").includes("BEGIN PRIVATE KEY"),
                        "| literal-\\n count:", ((j.private_key||"").match(/\\n/g)||[]).length,
                        "| real-newline count:", ((j.private_key||"").match(/\n/g)||[]).length);
          '
          npm install -g firebase-tools

          # Firebase's webframeworks deploy updates the SSR Cloud Function and
          # THEN releases the Hosting version. The function update can hit a
          # transient "409 unable to queue the operation" (a premature-close race
          # in Cloud Functions v2). When it does, the deploy aborts BEFORE the
          # Hosting release — a split-brain where the function updates but the
          # site keeps serving the PREVIOUS release. So we retry, and we treat a
          # missing "release complete" marker as failure even if the CLI exits 0
          # (belt-and-suspenders against a silent abort that still returns 0).
          log="$RUNNER_TEMP/firebase-deploy.log"
          attempt=0; max=3
          until [ "$attempt" -ge "$max" ]; do
            attempt=$((attempt + 1))
            echo "::group::firebase deploy (attempt $attempt/$max)"
            GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json" \
              firebase deploy --only hosting,firestore:rules,firestore:indexes \
                --project ttuboc-attendance --non-interactive 2>&1 | tee "$log"
            code="${PIPESTATUS[0]}"
            echo "::endgroup::"
            if [ "$code" -eq 0 ] && grep -q "release complete" "$log"; then
              echo "✅ Deploy succeeded and Hosting release finalized (attempt $attempt)."
              exit 0
            fi
            echo "⚠ Deploy attempt $attempt did not finalize a Hosting release (exit $code)."
            [ "$attempt" -lt "$max" ] && { echo "Retrying in 30s…"; sleep 30; }
          done
          echo "❌ Deploy failed after $max attempts — Hosting was NOT released."
          exit 1
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TTUBOC_ATTENDANCE }}
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          FUNCTIONS_DISCOVERY_TIMEOUT: "60"
